name: Award daily push-up points

# Polls each participant's live push-up count and awards 1 point the first time
# they cross that day's target. Idempotent (migration 0012), so running many
# times a day is safe — later runs just no-op for anyone already awarded.
#
# The API only reports the CURRENT Brisbane day and resets at midnight, so we
# must capture the day BEFORE midnight Brisbane. Brisbane is UTC+10 with no DST:
#   3:00pm Brisbane = 05:00 UTC   •   11:30pm Brisbane = 13:30 UTC
# Runs every 30 min from 3:00pm to 11:30pm Brisbane, plus a final 11:58pm sweep
# right before the count resets (catches last-minute late-night push-ups).
#
# Note: GitHub-hosted cron can be delayed or occasionally skipped under load.
# That's fine here — award-on-cross means a missed run is caught by the next one.
# Out of June (no row in pushup_targets.csv), each run harmlessly does nothing;
# disable this workflow once the push-up challenge ends if you want to stop it.

on:
  schedule:
    - cron: "0,30 5-13 * * *" # 15:00–23:30 Brisbane, every 30 min
    - cron: "58 13 * * *"     # 23:58 Brisbane — last grab before midnight reset
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: award-pushups
  cancel-in-progress: false

jobs:
  award:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # 22, not 20: @supabase/supabase-js spins up a Realtime client on
          # createClient() and needs a global WebSocket, which Node 20 lacks.
          node-version: 22
          cache: npm
      - run: npm ci
      - run: node scripts/award_pushups.mjs
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
